<article class="card mb-4 project-card">
  <div class="row g-0">
    <div class="col-md-4">
      {% if include.project.image %}
        <img
          src="{{ include.project.image | relative_url }}"
          alt="{{ include.project.title }}"
          class="img-fluid rounded project-card-image"
        >
      {% endif %}
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h3 class="card-title h5">
          <a href="{{ include.project.url | relative_url }}">{{ include.project.title }}</a>
        </h3>
        {% if include.project.description %}
          <p class="card-text">{{ include.project.description }}</p>
        {% endif %}
      </div>
    </div>
  </div>
</article>
